name: Build Tweak

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          mkdir -p $HOME/theos/sdks
          curl -L -o iPhoneOS14.5.sdk.tar.xz https://github.com/theos/sdks/releases/latest/download/iPhoneOS14.5.sdk.tar.xz
          tar -xf iPhoneOS14.5.sdk.tar.xz -C $HOME/theos/sdks
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH
          
      - name: Install ldid
        run: brew install ldid

      - name: Build Tweak
        run: |
          export CXXFLAGS="-Wno-module-import-in-extern-c"
          make package
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tweak-Package
          path: packages/*.deb
