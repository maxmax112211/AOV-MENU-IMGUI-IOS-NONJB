name: Build Tweak

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install Theos and SDKs
        run: |
          # Cài đặt Theos không dùng script tự động cài SDK mặc định nếu nó hay lỗi
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          
          # Tạo thư mục SDK thủ công nếu chưa có
          mkdir -p $THEOS/sdks
          
          # Tải SDK thủ công từ nguồn ổn định hơn
          curl -L -o iPhoneOS14.5.sdk.tar.xz https://github.com/theos/sdks/releases/latest/download/iPhoneOS14.5.sdk.tar.xz
          tar -xf iPhoneOS14.5.sdk.tar.xz -C $THEOS/sdks
          
          export THEOS=/Users/runner/theos
          export PATH=$THEOS/bin:$PATH
          make package
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tweak-Package
          path: packages/*.deb
